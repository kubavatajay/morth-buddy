<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morth Buddy — AI Orthodontics Learning</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --primary: #1a6b9a;
  --accent: #00c9a7;
  --gold: #f0a500;
  --dark: #0d1b2a;
  --glass: rgba(255,255,255,0.10);
  --glass-border: rgba(255,255,255,0.20);
  --card-shadow: 0 8px 32px rgba(26,107,154,0.18);
  --font: 'Segoe UI', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: linear-gradient(135deg, #0d1b2a 0%, #1a3a5c 50%, #0d2d1f 100%);
  min-height: 100vh;
  color: #fff;
  overflow-x: hidden;
}
.header {
  background: rgba(13,27,42,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 32px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display:flex; align-items:center; gap:12px; }
.logo-icon { font-size:32px; }
.logo-text h1 { font-size:22px; font-weight:700; color:#fff; }
.logo-text p  { font-size:12px; color:var(--accent); }
.header-actions { display:flex; gap:12px; align-items:center; }
.btn-register {
  background: linear-gradient(135deg, var(--accent), var(--primary));
  border: none; color:#fff; padding:10px 22px;
  border-radius: 25px; font-weight:600; cursor:pointer;
  font-size:14px; transition: transform 0.2s, box-shadow 0.2s;
}
.app-layout {
  display: grid;
  grid-template-columns: 260px 1fr 300px;
  gap: 24px;
  max-width: 1400px;
  margin: 0 auto;
  padding: 28px 24px;
}
@media (max-width:1200px) {
  .app-layout { grid-template-columns: 1fr; }
  .sidebar-left, .sidebar-right { display:none; }
}
.glass-card {
  background: var(--glass);
  backdrop-filter: blur(18px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 24px;
  box-shadow: var(--card-shadow);
}
.nav-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; border-radius:12px; cursor:pointer;
  transition:all 0.2s; color:rgba(255,255,255,0.8); font-size:14px;
}
.nav-item:hover, .nav-item.active {
  background:rgba(0,201,167,0.15); color:#fff;
  border-left:3px solid var(--accent);
}
.community-btn {
  display:flex; align-items:center; gap:12px;
  padding:13px 16px; border-radius:14px;
  text-decoration:none; font-size:14px; font-weight:600;
  transition:all 0.2s; border:1px solid rgba(255,255,255,0.1);
  margin-bottom: 10px;
}
.community-btn.whatsapp  { background:rgba(37,211,102,0.12); color:#25d366; }
.community-btn.linkedin  { background:rgba(0,119,181,0.15); color:#0af; }
.option-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px; padding: 16px 20px;
  color:#fff; font-size:15px; cursor:pointer;
  text-align:left; transition:all 0.25s;
  display:flex; align-items:center; gap:12px;
  width: 100%;
  margin-bottom: 10px;
}
.explanation-box {
  background: rgba(0,201,167,0.1); border:1px solid rgba(0,201,167,0.3);
  border-radius:14px; padding:16px 20px; margin-top:16px;
  font-size:14px; line-height:1.7; display:none;
}
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px); z-index:1000;
  display:none; align-items:center; justify-content:center;
  padding:20px;
}
.modal-overlay.open { display:flex; }
.modal-box {
  background:linear-gradient(135deg,#0d2a40,#1a3a5c);
  border:1px solid var(--glass-border); border-radius:24px;
  padding:36px; max-width:500px; width:100%;
}
.floating-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(13,27,42,0.95); backdrop-filter:blur(20px);
  border-top:1px solid var(--glass-border); padding:12px 20px;
  display:none; gap:10px; z-index:50;
  justify-content:center;
}
@media (max-width:1200px) { .floating-bar { display:flex; } }
</style>
</head>
<body>
<script>
  const WA_AI_ORTHO      = 'https://chat.whatsapp.com/JdJbzUIiVPlE2aEQI7Z2qd';
  const WA_MORTH_BUDDY   = 'https://chat.whatsapp.com/BmlKwHA9xpi9i50iCM6yid';
  const LINKEDIN_URL     = 'https://www.linkedin.com/in/dr-ajay-kubavat-708205210';
</script>
<header class="header">
  <div class="logo">
    <div class="logo-icon">🦷</div>
    <div class="logo-text">
      <h1>Morth Buddy</h1>
      <p>AI Orthodontics Learning Platform</p>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-register" onclick="openModal('registerModal')">📝 Register Free</button>
  </div>
</header>
<div class="app-layout">
  <aside class="sidebar-left">
    <div class="glass-card">
      <div class="nav-item active"><i class="fas fa-brain"></i> MCQ Practice</div>
      <div class="nav-item"><i class="fas fa-chart-line"></i> Cephalometrics</div>
      <div class="nav-item"><i class="fas fa-robot"></i> AI in Ortho</div>
    </div>
  </aside>
  <main class="main-content">
    <div class="glass-card">
      <h2 id="questionText">Loading...</h2>
      <div id="optionsGrid"></div>
      <div class="explanation-box" id="explanationBox"></div>
      <div style="margin-top:20px; display:flex; justify-content:space-between;">
        <button onclick="openModal('reportModal')" style="background:none; border:1px solid #f72585; color:#f72585; padding:8px 15px; border-radius:20px; cursor:pointer;">🚩 Report Error</button>
        <button id="nextBtn" style="display:none; background:var(--accent); border:none; color:white; padding:10px 20px; border-radius:20px; cursor:pointer;" onclick="nextQuestion()">Next →</button>
      </div>
    </div>
  </main>
  <aside class="sidebar-right">
    <div class="glass-card">
      <h3>Community</h3>
      <a id="waAiLink" href="#" target="_blank" class="community-btn whatsapp"><i class="fab fa-whatsapp"></i> AI in Ortho</a>
      <a id="waMorthLink" href="#" target="_blank" class="community-btn whatsapp"><i class="fab fa-whatsapp"></i> Morth Buddy</a>
      <a id="liLink" href="#" target="_blank" class="community-btn linkedin"><i class="fab fa-linkedin"></i> LinkedIn</a>
    </div>
  </aside>
</div>
<div class="floating-bar">
  <a id="waMobile" href="#" target="_blank" class="community-btn whatsapp">AI Ortho</a>
  <a id="liMobile" href="#" target="_blank" class="community-btn linkedin">LinkedIn</a>
</div>
<div class="modal-overlay" id="registerModal">
  <div class="modal-box">
    <h2>Register</h2>
    <p>Submit details for approval.</p>
    <button onclick="closeModal('registerModal')">Close</button>
  </div>
</div>
<div class="modal-overlay" id="reportModal">
  <div class="modal-box">
    <h2>Report Error</h2>
    <textarea id="errorDetails" style="width:100%; height:100px; margin:10px 0;" placeholder="What is wrong?"></textarea>
    <button onclick="closeModal('reportModal')">Submit</button>
  </div>
</div>
<script>
  document.getElementById('waAiLink').href = WA_AI_ORTHO;
  document.getElementById('waMorthLink').href = WA_MORTH_BUDDY;
  document.getElementById('liLink').href = LINKEDIN_URL;
  document.getElementById('waMobile').href = WA_AI_ORTHO;
  document.getElementById('liMobile').href = LINKEDIN_URL;
  const questions = [
    { q: "According to Scammon's growth curves, which tissue reaches 200% size at 10 years?", options: ["Neural", "Somatic", "Genital", "Lymphatic"], correct: 3, exp: "Lymphatic tissue undergoes excessive growth in childhood before involuting." },
    { q: "Wits appraisal uses which reference plane?", options: ["FH Plane", "SN Plane", "Occlusal Plane", "Mandibular Plane"], correct: 2, exp: "Wits uses the functional occlusal plane." }
  ];
  let currentQ = 0;
  function loadQuestion() {
    const q = questions[currentQ];
    document.getElementById('questionText').innerText = q.q;
    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerText = opt;
      btn.onclick = () => {
        document.getElementById('explanationBox').style.display = 'block';
        document.getElementById('explanationBox').innerText = q.exp;
        document.getElementById('nextBtn').style.display = 'block';
      };
      grid.appendChild(btn);
    });
  }
  function nextQuestion() {
    currentQ = (currentQ + 1) % questions.length;
    document.getElementById('explanationBox').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'none';
    loadQuestion();
  }
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  loadQuestion();
</script>
</body>
</html>
